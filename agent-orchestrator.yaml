port: 3000
defaults:
  runtime: tmux
  agent: claude-code
  workspace: worktree
  notifiers: []
projects:
  paradise-soft:
    name: paradise-soft
    sessionPrefix: ps
    repo: huskylin/agent-orchestrator-demo
    path: ~/projects/agent-orchestrator-demo
    defaultBranch: main
    agentRules: |-
      Always run tests before pushing.
      Use conventional commits (feat:, fix:, chore:, docs:, refactor:, test:).
      Link issue numbers in commit messages.
      Write clear commit messages that explain WHY, not just WHAT.
      Before opening a PR, always rebase on the latest main: git fetch origin && git rebase origin/main.
      Only modify files listed in the "負責檔案範圍" section of the issue. Do not touch files owned by other issues.
      If the issue says "Blocked by #N", do NOT start work — report back that the blocking issue must be merged first.
      For every new component or utility you create, write at least one test file (*.test.tsx or *.test.ts) using Vitest + @testing-library/react. Place tests next to the source file (e.g. src/components/Foo.tsx → src/components/Foo.test.tsx).
      Before pushing, run: npx tsc --noEmit && npm run lint && npm test && npm run build. Fix all errors before opening a PR.
    orchestratorRules: |-
      When breaking down high-level issues into granular tasks, follow these rules:

      1. 每個 issue 只負責明確的一組檔案，並在 issue 內列出「負責檔案範圍」。
      2. 平行執行的 issues 之間不能有任何重疊的檔案。如果兩個 issue 都需要修改同一個檔案（例如 App.tsx），必須串行執行，用「Blocked by #N」標示依賴關係。
      3. Issue 的粒度以「一個 agent 在一個 session 內能完成」為標準，不要過大也不要過細。
      4. 有依賴關係的 issues 要在 issue body 裡明確寫出：被誰 block、以及為什麼。
      5. 建立 issues 之後，先執行沒有依賴關係的 issues（可以 batch-spawn），等它們的 PR merge 後再執行有依賴的 issues。
      6. 不要同時 spawn 修改同一個檔案的 issues，即使它們是 MERGEABLE 狀態。
    tracker:
      plugin: jira
      path: ~/projects/agent-orchestrator/packages/plugins/tracker-jira
      baseUrl: https://jira.paradise-soft.com.tw
      project: MOPFREQ
